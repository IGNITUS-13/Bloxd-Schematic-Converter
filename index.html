<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd to Minecraft Schematic Converter</title>
    <!-- Conectamos la librería de compresión y tus estilos separados -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-container">
        <h1>Bloxd Schematic Converter</h1>
        <p>Convert your Bloxd.io structures into Mine-imator compatible .schematic files instantly.</p>
        
        <label for="file-input" class="drop-zone" id="drop-zone">
            <p>Drag & Drop your .bloxdschem file here</p>
            <span>or click to browse your computer</span>
            <input type="file" id="file-input" accept=".bloxdschem">
        </label>

        <div id="status" class="status-message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
